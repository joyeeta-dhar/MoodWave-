services:
  - type: web
    name: moodwave-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LASTFM_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
